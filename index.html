<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player</title>
    <link rel="shortcut icon" href="./Images/logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <!-- CSS Files -->
     <link rel="stylesheet" href="./CSS/nav.css">
     <link rel="stylesheet" href="./CSS/main.css">
</head>
<body>
    <header class="nav">
        <div class="logo">
            <div class="logo-nakli">
                <i class="ri-spotify-fill pic"></i>
                <i class="ri-home-5-fill home"></i>
                <div class="search" id="search">
                    <i class="ri-search-line sir"></i>
                    <input type="text" size="35" placeholder="What do You want to play?">
                    <i class="ri-folder-open-line folder"></i>
                </div>
            </div>
            <div class="profile">
                <button class="premium">Explor premium</button>
                <button class="Install"><i class="ri-arrow-down-circle-line"></i> &nbsp; Install App</button>
                <i class="ri-notification-2-line"></i>
                <i class="ri-team-fill"></i>
                <button class="pro-btn">V</button>
            </div>
        </div>

    </header>
    <script src="./JS/nav.js"></script>
</body>
</html>
